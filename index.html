<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quanto tempo falta para a copa do mundo de 2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="timer">
      <label for="">Dias</label>
      <input type="number" id="inputDays" value="1000" readonly>
    </div>
    <div class="timer">
      <label for="">Horas</label>
      <input type="number" id="inputHours" value="0" readonly>
    </div>
    <div class="timer">
      <label for="">Minutos</label>
      <input type="number" id="inputMinutes" value="0" readonly>
    </div>
    <div class="timer">
      <label for="">Segundos</label>
      <input type="number" id="inputSeconds" value="0" readonly>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
